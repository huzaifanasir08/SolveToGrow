<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahmed Dev Problems</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="site.js" defer></script>
</head>
<body>
  <header class="hero developer-hero" style="--accent: #f97316; --soft: #ffedd5; --warm: #dcfce7; --ring: rgba(249, 115, 22, 0.2);">
    <nav class="topbar">
      <a class="back-link" href="index.html"><span aria-hidden="true">&larr;</span> Team overview</a>
    </nav>
    <div class="hero-inner">
      <div class="hero-copy">
        <p class="eyebrow">Code challenges</p>
        <h1>Ahmed Dev problem archive.</h1>
        <p>Click a file card to expand the solution preview only when you need it.</p>
        <div class="stat-row">
          
      <div class="stat">
        <strong>0</strong>
        <span>Developer files</span>
      </div>
    
          
      <div class="stat">
        <strong>0</strong>
        <span>Developer lines</span>
      </div>
    
          
      <div class="stat">
        <strong>0</strong>
        <span>Shared files</span>
      </div>
    
        </div>
      </div>
    </div>
  </header>

  <main class="content" style="--accent: #f97316; --soft: #ffedd5; --ring: rgba(249, 115, 22, 0.2);">
    
    
      <section class="file-section">
        <h2>Developer Files</h2>
        <div class="file-grid">
          <p class="empty-state">No problem files found in this workspace yet.</p>
        </div>
      </section>
    
    
      <section class="file-section">
        <h2>Shared Problems</h2>
        <div class="file-grid">
          <p class="empty-state">No shared problems found yet.</p>
        </div>
      </section>
    
  </main>
</body>
</html>
